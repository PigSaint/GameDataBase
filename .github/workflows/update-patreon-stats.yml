name: Update Patreon Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Patreon campaign data
        run: |
          set -euo pipefail
          curl -fsSL "https://www.patreon.com/api/campaigns/11667791" -o /tmp/patreon_campaign.json

      - name: Build stats JSON
        run: |
          set -euo pipefail
          creation_count=$(jq -r '.data.attributes.creation_count' /tmp/patreon_campaign.json)
          patron_count=$(jq -r '.data.attributes.patron_count' /tmp/patreon_campaign.json)
          pledge_sum=$(jq -r '.data.attributes.pledge_sum' /tmp/patreon_campaign.json)
          pledge_sum_currency=$(jq -r '.data.attributes.pledge_sum_currency' /tmp/patreon_campaign.json)
          updated_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > patreon/stats.json <<EOF
          {
            "creation_count": ${creation_count},
            "patron_count": ${patron_count},
            "pledge_sum": ${pledge_sum},
            "pledge_sum_currency": "${pledge_sum_currency}",
            "updated_at": "${updated_at}"
          }
          EOF

      - name: Commit changes
        run: |
          set -euo pipefail
          if git diff --quiet -- patreon/stats.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add patreon/stats.json
          git commit -m "chore: update patreon stats"
          git push
